<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>简易记账</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-top">
        <h1>简易记账</h1>
        <p class="subtitle">记录每一笔收支，掌控你的财务</p>
      </div>
      <div class="summary">
        <div class="summary-card income">
          <span class="label">总收入</span>
          <span class="value" id="totalIncome">¥0.00</span>
        </div>
        <div class="summary-card expense">
          <span class="label">总支出</span>
          <span class="value" id="totalExpense">¥0.00</span>
        </div>
        <div class="summary-card balance">
          <span class="label">结余</span>
          <span class="value" id="balance">¥0.00</span>
        </div>
      </div>
    </header>

    <main class="main">
      <section class="panel form-panel">
        <h2 id="formTitle">添加记录</h2>
        <form id="recordForm">
          <input type="hidden" id="recordId">
          <div class="form-row">
            <label for="date">日期</label>
            <input type="date" id="date" required>
          </div>
          <div class="form-row">
            <label for="type">类型</label>
            <select id="type" required>
              <option value="expense">支出</option>
              <option value="income">收入</option>
            </select>
          </div>
          <div class="form-row">
            <label for="category">分类</label>
            <select id="category" required></select>
          </div>
          <div class="form-row">
            <label for="amount">金额</label>
            <input type="number" id="amount" min="0.01" step="0.01" placeholder="0.00" required>
          </div>
          <div class="form-row">
            <label for="note">备注</label>
            <input type="text" id="note" placeholder="可选备注" maxlength="100">
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="submitBtn">添加记录</button>
            <button type="button" class="btn btn-secondary hidden" id="cancelBtn">取消编辑</button>
          </div>
        </form>
      </section>

      <section class="panel list-panel">
        <div class="list-header">
          <h2>记录列表</h2>
          <div class="filters">
            <select id="filterType">
              <option value="all">全部类型</option>
              <option value="income">仅收入</option>
              <option value="expense">仅支出</option>
            </select>
            <input type="month" id="filterMonth" title="按月份筛选">
            <button type="button" class="btn btn-ghost" id="clearFilter">清除筛选</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>日期</th>
                <th>类型</th>
                <th>分类</th>
                <th>金额</th>
                <th>备注</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="recordList"></tbody>
          </table>
        </div>
        <p class="empty-tip hidden" id="emptyTip">暂无记录，添加第一条吧。</p>
      </section>
    </main>
  </div>

  <div class="toast hidden" id="toast"></div>
  <div class="loading-overlay hidden" id="loadingOverlay">
    <div class="spinner"></div>
  </div>

  <div class="modal hidden" id="deleteModal">
    <div class="modal-backdrop"></div>
    <div class="modal-box">
      <h3>确认删除</h3>
      <p>确定要删除这条记录吗？此操作无法撤销。</p>
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" id="cancelDelete">取消</button>
        <button type="button" class="btn btn-danger" id="confirmDelete">删除</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
