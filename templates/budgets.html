{% extends "base.html" %}

{% block title %}{{ _('预算管理') }} - {{ _('简易记账') }}{% endblock %}

{% block content %}
<div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
  <div>
    <h1 class="h3 mb-1">{{ _('预算管理') }}</h1>
    <p class="text-muted mb-0">{{ _('为每个月设置支出预算。') }}</p>
  </div>
  <input class="form-control w-auto" type="month" id="budgetMonth">
</div>

<section class="card border-0 shadow-sm">
  <div class="card-body">
    <div class="input-group mb-3">
      <span class="input-group-text">￥</span>
      <input class="form-control" type="number" id="budgetAmount" min="0" step="0.01" placeholder="{{ _('设置预算金额') }}">
      <button class="btn btn-primary" type="button" id="saveBudgetBtn">{{ _('保存预算') }}</button>
    </div>
    <div class="d-flex justify-content-between small text-muted mb-1">
      <span id="budgetUsed">{{ _('已用 %(amount)s', amount='￥0.00') }}</span>
      <span id="budgetPercent">0%</span>
    </div>
    <div class="progress mb-3">
      <div class="progress-bar" id="budgetProgress" style="width: 0%"></div>
    </div>
    <div class="alert alert-secondary mb-0 py-2" id="budgetStatus">{{ _('未设置预算') }}</div>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/budgets.js') }}"></script>
{% endblock %}
